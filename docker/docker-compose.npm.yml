services:
  genefoundry-router:
    # NPM resolves its upstream by container name (`proxy_pass http://genefoundry_router:8000`),
    # so this overlay must pin it. Without it Compose auto-names the container
    # `genefoundry-router-genefoundry-router-1`, nginx cannot resolve the upstream, and the
    # public /mcp endpoint goes down. Worse, an unresolvable upstream also makes `nginx -s
    # reload` fail, which blocks NPM config changes for every other site on the host.
    container_name: genefoundry_router
    # !reset (not []) is required: Compose MERGES list fields across -f overlays, so a
    # plain `ports: []` would NOT drop the base file's "${...:-8010}:8000" mapping — it
    # would stay published on the host, exposing the auth=none gateway on the public IP.
    # Behind NPM the router must be expose-only (reachable solely via the proxy network).
    ports: !reset []
    expose:
      - "8000"
    pull_policy: missing
    networks:
      - npm-network

networks:
  npm-network:
    external: true
    # The nginx-proxy-manager container is attached to npm_default on the VPS; default to it.
    name: ${NPM_NETWORK_NAME:-npm_default}
