# Explicit project name isolates this stack from other -link repos. Without it, Compose
# defaults the project to the parent-dir basename ("docker"), which every repo that keeps
# its compose at docker/docker-compose.yml shares — pooling unrelated containers/volumes
# into one "docker" project and triggering spurious orphan-container warnings (and making
# `--remove-orphans` from here capable of deleting a sibling stack). See Compose spec:
# https://docs.docker.com/reference/compose-file/version-and-name/
name: genefoundry-router

services:
  genefoundry-router:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false
    environment:
      GF_HOST: 0.0.0.0
      GF_PORT: 8000
      GF_MCP_PATH: /mcp
      GF_LOG_LEVEL: INFO
      GF_ALLOWED_HOSTS: "${GF_ALLOWED_HOSTS:-localhost,127.0.0.1,::1}"
      GF_HEALTHCHECK_HOST: "${GF_HEALTHCHECK_HOST:-localhost}"
      GF_DRIFT_MODE: "${GF_DRIFT_MODE:-warn}"
      GF_DRIFT_BASELINE: "${GF_DRIFT_BASELINE:-}"
    ports:
      - "${GENEFOUNDRY_ROUTER_HOST_PORT:-8010}:8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f -H \"Host: $${GF_HEALTHCHECK_HOST}\" http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
