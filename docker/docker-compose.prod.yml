services:
  genefoundry-router:
    build: !reset null
    image: ${GENEFOUNDRY_IMAGE:?set a verified digest-addressed image}
    pull_policy: missing
    ports: !reset []
    expose:
      - "8000"
    environment:
      GF_DEPLOYMENT_MODE: production
      GF_LOG_LEVEL: INFO
      GF_ALLOWED_HOSTS: "${GF_ALLOWED_HOSTS:?set the public router hostname}"
      GF_HEALTHCHECK_HOST: "${GF_HEALTHCHECK_HOST:?set the public health-check Host}"
      GF_DRIFT_MODE: enforce
      # OAuthProxy persists its DCR client registrations, auth codes, and refresh
      # tokens as an encrypted FileTreeStore under $FASTMCP_HOME. Point it at the
      # durable fastmcp_data volume (below) — NOT /tmp (tmpfs, wiped every restart,
      # which caused "Client Not Registered" and forced clients to reconnect).
      FASTMCP_HOME: /data/fastmcp
    # Repeat the security boundary explicitly in this reference overlay. !override
    # prevents Compose list merging from duplicating inherited entries.
    read_only: true
    tmpfs: !override
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    volumes: !override
      - fastmcp_data:/data
    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL
    init: true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
          pids: 256
    restart: on-failure
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
