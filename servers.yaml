# servers.yaml — committed backend registry (no secrets; URLs come from .env)
defaults:
  transport: http
  enabled: true
  cache_ttl: 300          # proxy metadata cache TTL (seconds)
  tags: []
servers:
  - { name: gnomad,      repo: berntpopp/gnomad-link,        url_env: GF_GNOMAD_URL,      namespace: gnomad,      tags: [variant, gene, frequency, population], entrypoints: [resolve_variant_id, search_genes, get_variant_frequencies, get_gene_variants] }
  - { name: gtex,        repo: berntpopp/gtex-link,          url_env: GF_GTEX_URL,        namespace: gtex,        tags: [expression, tissue], entrypoints: [get_median_expression_levels] }
  - { name: hgnc,        repo: berntpopp/hgnc-link,          url_env: GF_HGNC_URL,        namespace: hgnc,        tags: [gene, nomenclature], entrypoints: [resolve_symbol] }  # deployed 2026-06-16 (hgnc-link.genefoundry.org)
  - { name: mgi,         repo: berntpopp/mgi-link,           url_env: GF_MGI_URL,         namespace: mgi,         tags: [mouse, phenotype, model], entrypoints: [get_marker_phenotypes] }
  - { name: uniprot,     repo: berntpopp/uniprot-link,       url_env: GF_UNIPROT_URL,     namespace: uniprot,     tags: [protein, function], entrypoints: [find_proteins] }
  - { name: clingen,     repo: berntpopp/clingen-link,       url_env: GF_CLINGEN_URL,     namespace: clingen,     tags: [gene-disease, curation], entrypoints: [get_gene_validity] }
  - { name: gencc,       repo: berntpopp/gencc-link,         url_env: GF_GENCC_URL,       namespace: gencc,       tags: [gene-disease, curation], entrypoints: [resolve_identifier] }
  - { name: litvar,      repo: berntpopp/litvar-link,        url_env: GF_LITVAR_URL,      namespace: litvar,      tags: [variant, literature], entrypoints: [get_variant_literature] }
  - { name: stringdb,    repo: berntpopp/stringdb-link,      url_env: GF_STRINGDB_URL,    namespace: stringdb,    tags: [ppi, network], entrypoints: [get_interaction_partners] }
  - { name: autopvs1,    repo: berntpopp/autopvs1-link,      url_env: GF_AUTOPVS1_URL,    namespace: autopvs1,    tags: [variant, acmg, pvs1], entrypoints: [get_variant_pvs1_data] }
  - { name: spliceai,    repo: berntpopp/spliceailookup-link, url_env: GF_SPLICEAI_URL,   namespace: spliceai,    tags: [variant, splicing, prediction], entrypoints: [predict_splicing] }
  - { name: genereviews, repo: berntpopp/genereviews-link,   url_env: GF_GENEREVIEWS_URL, namespace: genereviews, tags: [literature, gene-disease], entrypoints: [search_genereviews] }
  - { name: pubtator,    repo: berntpopp/pubtator-link,      url_env: GF_PUBTATOR_URL,    namespace: pubtator,    tags: [literature, entity], entrypoints: [search_literature] }  # adopted Tool-Naming Standard v1 (pubtator-link#57, PR #64) — no transform needed
  # --- Deployed 2026-06-17 at <name>-link.genefoundry.org (DNS + container + NPM live). ---
  - { name: clinvar,     repo: berntpopp/clinvar-link,       url_env: GF_CLINVAR_URL,     namespace: clinvar,     tags: [variant, clinical-significance, classification], entrypoints: [get_variant] }
  - { name: vep,         repo: berntpopp/vep-link,           url_env: GF_VEP_URL,         namespace: vep,         tags: [variant, annotation, consequence], entrypoints: [annotate_variant] }  # action server: annotate/recode/liftover verbs (Standard v1.1-pending), still unprefixed
  - { name: panelapp,    repo: berntpopp/panelapp-link,      url_env: GF_PANELAPP_URL,    namespace: panelapp,    tags: [gene-panel, gene-disease, curation], entrypoints: [search_panels] }
  - { name: mondo,       repo: berntpopp/mondo-link,         url_env: GF_MONDO_URL,       namespace: mondo,       tags: [disease, ontology], entrypoints: [resolve_disease] }
  # --- Staged/ready 2026-06-20 (new GeneFoundry fleet backends; URL vars below). ---
  - { name: mavedb,      repo: berntpopp/mavedb-link,        url_env: GF_MAVEDB_URL,      namespace: mavedb,      tags: [variant, mave, functional-assay, variant-effect, score-set], entrypoints: [search_score_sets] }
  - { name: hpo,         repo: berntpopp/hpo-link,           url_env: GF_HPO_URL,         namespace: hpo,         tags: [phenotype, ontology, gene, disease], entrypoints: [resolve_term, get_phenotypes_for_gene, get_genes_for_phenotype] }  # build complete + DB artifact published (db-v2026-06-06); enable once hpo-link.genefoundry.org is deployed
  - { name: metadome,    repo: berntpopp/metadome-link,      url_env: GF_METADOME_URL,    namespace: metadome,    tags: [protein, tolerance, domain, variant], entrypoints: [resolve_transcript, get_tolerance_landscape] }
  - { name: orphanet,    repo: berntpopp/orphanet-link,      url_env: GF_ORPHANET_URL,    namespace: orphanet,    tags: [disease, ontology, rare-disease, epidemiology, gene, phenotype], entrypoints: [resolve_disease] }
