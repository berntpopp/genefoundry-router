      - {tool: get_protein_diseases, pointer: /diseases/*/involvement}
      - {tool: get_protein_variants, pointer: /variants/*/description}
    max_text_bytes: 2097152
    max_objects: 128
    compatibility: pending-v1.1
    test_vector: hostile-upstream-text-v1
    classification: untrusted-text
    evidence: uniprot_link/services/shaping.py:190,270,288,341 (rdfs:comment literals)
    existing_sanitization: none (SPARQL literal escaping is input-only)

