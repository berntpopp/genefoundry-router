# Completeness inventory for Response-Envelope Standard v1.1.
#
# Source audit COMPLETE 2026-07-10 (see docs/plans/2026-07-10-fleet-modernization-reconciliation.md
# §5); v1.1 fleet adoption COMPLETE 2026-07-11 (see
# docs/plans/2026-07-11-untrusted-content-fencing-fleet-adoption.md). Every row now names the
# exact free-text tool(s) + JSON pointer(s) or is classified no-untrusted-text with model/test
# evidence. `compatibility` tracks adoption:
#   breaking-v1.1        = typed untrusted_text object shipped + hostile test passing, released
#   pending-v1.1         = untrusted-text surface identified; backend adoption still owed
#   n/a-no-untrusted-text = verified: returns only structured/numeric/identifier/enum data
# A backend becomes v1.1 conformant only when its hostile test passes and its output schema
# exposes the literal typed object. `raw_sha256`/provenance are emitted by the backend, never
# the router. The router treats any `kind: untrusted_text` subtree as opaque (hints.py).
# `measured_exceptions` records a per-tool object-count ceiling above the fleet default 128 MUST
# be measured against the tool's own real result cap, never inflated arbitrarily (see the v1.1
# Limits section: "A measured exception MUST retain a hard ceiling and be recorded in the
# inventory"). The 2 MiB/object and 8 MiB/total byte ceilings are always enforced regardless.
version: 1.1
defaults:
  max_text_bytes: 2097152
  max_objects: 128
  max_depth: 8
  max_total_text_bytes: 8388608
backends:
  - backend: pubtator
    tool: get_publication_passages
    json_pointers: [/passages/*/text]
    max_text_bytes: 2097152
    max_objects: 128
    compatibility: breaking-v1.1
    test_vector: hostile-literature-v1
    classification: untrusted-text
    evidence: pubtator_link/models/publication_passages.py:MCPPublicationPassage.text
    existing_sanitization: v1.1 fence (fence_untrusted_text) shipped, released 6.0.0

  - backend: genereviews
    tool: search_passages
    json_pointers: [/results/*/text, /results/*/snippet]
    surfaces:
      - {tool: search_passages, pointer: /results/*/text}
      - {tool: search_passages, pointer: /results/*/snippet}
      - {tool: search_passages, pointer: /results/*/chapter_title}
      - {tool: search_passages, pointer: /results/*/heading_path}
      - {tool: get_passage, pointer: /passage/text}
      - {tool: get_passage, pointer: /passage/chapter_title,heading_path (+neighbors_before/after/*/text)}
      - {tool: get_passages_batch, pointer: /passages/*/text}
      - {tool: search_passages_batch, pointer: /results/*/hits/*/text,snippet}
      - {tool: get_chapter_section, pointer: /content}
      - {tool: get_chapter_section, pointer: /chapter_title,/passages/*/heading_path}
      - {tool: get_chapter_metadata, pointer: /title,/tables/*/caption,/tables/*/heading_path}
      - {tool: get_table, pointer: /caption,/heading_path,/header/*,/rows/*/*}
      - {tool: get_fulltext, pointer: /sections/*/content (recursive)}
      - {tool: get_fulltext, pointer: /title,/metadata/authors,/metadata/update_info,/metadata/publication_info,/metadata/references/*}
      - {tool: get_abstract, pointer: /text}
      - {tool: get_abstract, pointer: /title,/journal,/authors/*}
      - {tool: get_genereview_summary, pointer: /summary,/diagnosis,/management,/other_sections/*/content}
      - {tool: get_genereview_summary, pointer: /title,/abstract_data/*,/full_text_data/metadata/*}
      - {tool: get_links, pointer: /link_entries/*/provider}
      - {tool: search_passages (opt-in table_data), pointer: /results/*/table_data/header/*,/rows/*/*}
    max_text_bytes: 2097152
    max_objects: 128
    measured_exceptions:
      - tool: "all list/aggregate-bearing tools (search_passages, search_passages_batch, get_table, get_fulltext, get_genereview_summary)"
        max_objects: 10000
        reason: "generic response-wide ceiling (genereview_link/api/untrusted_limits.py collect_untrusted+guard_untrusted_limits) avoids false rejection on long chapters/tables"
    compatibility: breaking-v1.1
    test_vector: hostile-literature-v1
    classification: untrusted-text
    evidence: >-
