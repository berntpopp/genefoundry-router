# Completeness inventory for Response-Envelope Standard v1.1.
#
# Source audit COMPLETE 2026-07-10 (see docs/plans/2026-07-10-fleet-modernization-reconciliation.md
# §5): every row now names the exact free-text tool(s) + JSON pointer(s) or is classified
# no-untrusted-text with model evidence. `compatibility` tracks adoption:
#   breaking-v1.1        = typed untrusted_text object shipped + hostile test passing (pubtator)
#   pending-v1.1         = untrusted-text surface identified; backend adoption (typed object +
#                          hostile-vector test) still owed
#   n/a-no-untrusted-text = verified: returns only structured/numeric/identifier/enum data
# A backend becomes v1.1 conformant only when its hostile test passes and its output schema
# exposes the literal typed object. `raw_sha256`/provenance are emitted by the backend, never
# the router. The router treats any `kind: untrusted_text` subtree as opaque (hints.py).
version: 1.1
defaults:
  max_text_bytes: 2097152
  max_objects: 128
  max_depth: 8
  max_total_text_bytes: 8388608
backends:
  - backend: pubtator
    tool: get_publication_passages
    json_pointers: [/passages/*/text]
    max_text_bytes: 2097152
    max_objects: 128
    compatibility: breaking-v1.1
    test_vector: hostile-literature-v1
    classification: untrusted-text
    evidence: pubtator_link/models/publication_passages.py:MCPPublicationPassage.text
    existing_sanitization: v1.1 fence (fence_untrusted_text) shipped, released 6.0.0

  - backend: genereviews
    tool: search_passages
    json_pointers: [/results/*/text, /results/*/snippet]
    surfaces:
      - {tool: search_passages, pointer: /results/*/text}
      - {tool: search_passages, pointer: /results/*/snippet}
      - {tool: get_passage, pointer: /passage/text}
      - {tool: get_passages_batch, pointer: /passages/*/text}
      - {tool: get_chapter_section, pointer: /content}
      - {tool: get_fulltext, pointer: /text}
      - {tool: get_abstract, pointer: /text}
    max_text_bytes: 2097152
    max_objects: 128
    compatibility: pending-v1.1
    test_vector: hostile-literature-v1
    classification: untrusted-text
    evidence: genereview_link/models/genereview_models.py:RankedPassage.text/snippet; PassageDetail.text
    existing_sanitization: genereview_link/api/eutils_client.py:1286 _clean_content (live path only; not a fence)

  - backend: uniprot
