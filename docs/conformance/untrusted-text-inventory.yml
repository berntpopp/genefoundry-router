# Completeness inventory for Response-Envelope Standard v1.1.
# Replace audit sentinels only in a PR containing exact source and hostile-vector evidence.
version: 1.1
defaults:
  max_text_bytes: 2097152
  max_objects: 128
  max_depth: 8
  max_total_text_bytes: 8388608
backends:
  - backend: pubtator
    tool: get_publication_passages
    json_pointers: [/passages/*/text]
    max_text_bytes: 2097152
    max_objects: 128
    compatibility: breaking-v1.1
    test_vector: hostile-literature-v1
    classification: untrusted-text
    evidence: pubtator_link/models/publication_passages.py:MCPPublicationPassage.text

  - backend: autopvs1
    tool: __source_audit_required__
    json_pointers: []
    max_text_bytes: 2097152
    max_objects: 128
    compatibility: pending-v1.1
    test_vector: hostile-upstream-text-v1
    classification: audit-pending
    evidence: autopvs1_link/mcp/tools/search_tool.py
