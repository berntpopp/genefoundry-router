# Official MCP Registry (registry.modelcontextprotocol.io) — ROUTER ONLY.
#
# The registry is the hub that MCP directories poll (its own docs tell aggregators to
# scrape GET /v0.1/servers hourly). Glama, Smithery and awesome-mcp-servers are otherwise
# submission-driven and do NOT crawl GitHub by topic — so this, not the About box, is how
# the fleet gets *listed*.
#
# ONLY the router is publishable, and this is a security boundary, not an oversight:
# a `remotes` entry MUST be publicly reachable, and the 21 backends are unauthenticated
# by design and reachable only behind the router (AGENTS.md). Publishing a backend as a
# reachable remote would expose an unauthenticated server to the internet. Do not.
# Listing backends individually would require `packages` (PyPI/OCI) entries instead.
#
# The router's endpoint is OAuth-protected (RFC 9728 discovery + dynamic client
# registration), which the registry supports — clients perform the OAuth flow.
registry:
  # Namespace is bound to the auth method: `io.github.<owner>/*` authenticates via GitHub
  # OIDC. Chosen once — renaming fragments identity across every downstream directory.
  name: io.github.berntpopp/genefoundry
  schema: https://static.modelcontextprotocol.io/schemas/2025-12-11/server.schema.json
  endpoint: https://genefoundry.org/mcp
  # The registry schema caps `description` at 100 chars — under half the GitHub About-box
  # budget — so this is its OWN copy, not a reuse. {n} is substituted from servers.yaml.
  description: >-
    MCP gateway federating {n} biomedical MCP servers behind one endpoint: gnomAD, ClinVar, HPO, VEP.

# The router. `description` is a template: {n} is substituted with the count of
# enabled backends in servers.yaml, so the fleet's headline number can never drift
# (README Standard v1, Rule 9 — derived numbers are machine-owned, not banned).
router:
  repo: berntpopp/genefoundry-router
  description: >-
    MCP gateway federating {n} biomedical MCP servers — gnomAD, ClinVar, HPO, UniProt,
    Ensembl VEP, PanelApp and more — behind one Streamable-HTTP endpoint, with
    collision-free namespaced tools and BM25 tool search.
  topics:
    - gateway
    - api-gateway
    - genomics
    - clinical-genetics
    - variant-interpretation

# The 21 `-link` backends. `namespace` keys into servers.yaml; coverage parity
# between the two files is gated by scripts/check_fleet_metadata.py.
backends:
  - namespace: gnomad
    description: >-
      MCP server for gnomAD (Genome Aggregation Database): variant allele frequencies,
      gene constraint, coverage, structural and mitochondrial variants, and liftover —
      as typed tools for LLM agents.
    topics: [gnomad, genomics, variant-interpretation, population-genetics, allele-frequency]

  - namespace: gtex
    description: >-
      MCP server for the GTEx Portal: tissue-specific gene expression — median and
      per-sample TPM, top expressed genes per tissue, and gene/transcript annotation —
      as typed tools for LLM agents.
    topics: [gtex, gene-expression, transcriptomics, genomics]

  - namespace: hgnc
    description: >-
      MCP server for HGNC (HUGO Gene Nomenclature Committee, genenames.org): gene symbol
      and ID resolution, cross-references, search, and gene groups — served from a local
      index of the HGNC bulk download.
    topics: [hgnc, gene-nomenclature, gene-symbol, genenames, genomics]

  - namespace: mgi
    description: >-
      MCP server for MGI (Mouse Genome Informatics): mouse gene, allele, mutation and
      phenotype data — the MGI marker page as structured tools, served from a local
      SQLite index.
    topics: [mgi, mouse-genetics, model-organism, phenotype, genomics]

  - namespace: uniprot
    description: >-
      MCP server for UniProt: protein function, sequence, features and cross-references
      over the UniProt SPARQL endpoint — intent-named tools plus a guarded raw-SPARQL
      escape hatch.
    topics: [uniprot, proteomics, sparql, rdf, protein-structure]

  - namespace: clingen
    description: >-
      MCP server for ClinGen (Clinical Genome Resource): gene–disease validity, dosage
      sensitivity, clinical actionability, and expert-panel variant pathogenicity (ERepo)
      — as typed tools for LLM agents.
    topics: [clingen, clinical-genetics, gene-curation, variant-interpretation, genomics]

  - namespace: gencc
    description: >-
      MCP server for GenCC (Gene Curation Coalition): harmonized gene–disease validity
      classifications across member submitters, with consensus and conflict detection per
      gene–disease pair.
    topics: [gencc, clinical-genetics, gene-curation, gene-disease, genomics]

  - namespace: litvar
    description: >-
      MCP server for NCBI LitVar2: search the biomedical literature by genetic variant —
      the index linking variants to the publications that mention them, as typed tools for
      LLM agents.
    topics: [litvar, literature-mining, variant-interpretation, pubmed, genomics]

  - namespace: stringdb
    description: >-
      MCP server for STRING v12: protein–protein association networks, interaction
      partners, and functional enrichment analysis — as typed tools for LLM agents.
    topics: [string-db, protein-protein-interaction, network-biology, proteomics, functional-enrichment]

  - namespace: autopvs1
    description: >-
      MCP server for AutoPVS1: automated ACMG PVS1 loss-of-function evidence for sequence
      variants and copy-number variants — variant interpretation as typed tools for LLM
      agents.
    topics: [autopvs1, acmg, variant-interpretation, clinical-genetics, loss-of-function]

  - namespace: spliceai
    description: >-
      MCP server for SpliceAI Lookup (Broad Institute): SpliceAI, Pangolin and
      SpliceAI-10k splice-impact predictions for variants, plus an Ensembl VEP-backed
      variant resolver.
    topics: [spliceai, pangolin, splicing, variant-interpretation, genomics]

  - namespace: genereviews
    description: >-
      MCP server for GeneReviews: the expert-authored, peer-reviewed gene–disease chapters
      on NCBI Bookshelf, served as a searchable corpus of individually citable passages.
    topics: [genereviews, literature-mining, clinical-genetics, rare-disease, gene-disease]

  - namespace: pubtator
    description: >-
      MCP server for NCBI PubTator3: biomedical literature search with gene, variant,
      disease and chemical entity annotation — returns compact, citable passages instead
      of raw BioC.
    topics: [pubtator, literature-mining, named-entity-recognition, pubmed, text-mining]

  - namespace: clinvar
    description: >-
      MCP server for NCBI ClinVar: variant clinical significance and gene-level
      classifications, served from a local SQLite index built from the ClinVar weekly bulk
      release — not the eUtils API.
    topics: [clinvar, variant-interpretation, clinical-genetics, pathogenicity, genomics]

  - namespace: vep
    description: >-
      MCP server for Ensembl VEP (Variant Effect Predictor) and Variant Recoder: variant
      consequence annotation and identifier recoding across GRCh38 and GRCh37.
    topics: [vep, ensembl, variant-annotation, variant-interpretation, genomics]

  - namespace: panelapp
    description: >-
      MCP server for PanelApp: consensus diagnostic gene panels and gene–disease ratings
      from Genomics England (UK) and PanelApp Australia — as typed tools for LLM agents.
    topics: [panelapp, gene-panel, clinical-genetics, rare-disease, gene-curation]

  - namespace: mondo
    description: >-
      MCP server for the Mondo Disease Ontology: disease term lookup, the is_a hierarchy,
      and cross-ontology mapping across OMIM, Orphanet, DOID, NCIT, UMLS and MeSH.
    topics: [mondo, ontology, disease-ontology, rare-disease, semantic-web]

  - namespace: mavedb
    description: >-
      MCP server for MaveDB: quantitative variant-effect scores from Multiplexed Assays of
      Variant Effect (MAVE) and deep mutational scanning — functional evidence as typed
      tools for LLM agents.
    topics: [mavedb, deep-mutational-scanning, variant-effect, functional-genomics, variant-interpretation]

  - namespace: hpo
    description: >-
      MCP server for the Human Phenotype Ontology (HPO): phenotype term lookup, the is_a
      hierarchy, cross-ontology mapping, and gene–phenotype–disease associations from HPO
      and HPOA.
    topics: [hpo, human-phenotype-ontology, phenotype, ontology, rare-disease]

  - namespace: metadome
    description: >-
      MCP server for MetaDome: per-position missense tolerance (dN/dS) landscapes for human
      transcripts, Pfam domains, meta-domain homolog aggregation, and gnomAD/ClinVar
      per-position counts.
    topics: [metadome, missense-tolerance, protein-domains, variant-interpretation, proteomics]

  - namespace: orphanet
    description: >-
      MCP server for Orphanet (Orphadata): rare-disease nomenclature, gene–disease
      associations, phenotypes, epidemiology and cross-references, from the Orphadata
      scientific knowledge files.
    topics: [orphanet, rare-disease, ontology, disease-ontology, epidemiology]
