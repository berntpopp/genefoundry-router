# fleet-metadata.yaml — the fleet's GitHub "About" box, as code.
#
# Single source of truth for every fleet repo's DESCRIPTION, TOPICS and WEBSITE —
# the only three fields GitHub search actually indexes (README content is NOT
# searched by default; `in:readme` is opt-in). The description is also served as
# the repo page's <title> and <meta name="description">, i.e. it IS the Google
# blue link and snippet.
#
# Governed by docs/REPO-METADATA-STANDARD-v1.md. Two gates:
#   make lint-metadata     # offline: validates THIS FILE against the standard  (in ci-local)
#   make metadata-check    # online:  reports drift between this file and live GitHub
#   make metadata-apply    # online:  pushes this file to GitHub
#
# Do not hand-edit repo metadata in the GitHub UI — it will be reported as drift
# and overwritten. Edit here.

# Who gets cited. Declared ONCE, here — deliberately NOT scraped from the 21
# pyproject.toml files, which disagree and are partly fabricated: pubtator-link's
# author is "AI Assistant", and gtex/litvar/stringdb list emails at domains that do
# not exist (dev@gtex-link.org, ...). A CITATION.cff exists to attribute a human;
# generating one from that data would put "AI Assistant" in someone's bibliography.
citation:
  message: "If you use this software, please cite it as below."
  authors:
    - family-names: Popp
      given-names: Bernt
      email: bernt.popp@charite.de
      affiliation: Charité – Universitätsmedizin Berlin
      # orcid: https://orcid.org/XXXX-XXXX-XXXX-XXXX
      #
      # OPERATOR: set this. An ORCID is the single highest-value field in a CITATION.cff
      # for an academic audience — it disambiguates you across every indexer. It is
      # intentionally left unset rather than guessed: an ORCID is a persistent identifier
      # bound to a real person, and inventing one would misattribute your work. Uncomment
      # with your real iD and re-run `make citation-write`.

# Applied to every repo in the fleet.
universal:
  homepage: https://genefoundry.org
  topics:
    # Protocol / ecosystem tier — how MCP users and aggregators find anything.
    - mcp                      # 49.7k repos: the pool everyone browses
    - mcp-server               # 20.7k repos: the canonical server token
    - model-context-protocol   # 17.2k repos: canonical long form
    - claude                   # 37.3k repos: primary client ecosystem
    - llm-tools                #  3.0k repos
    - fastmcp                  #  1.5k repos: the framework
    # Domain tier — the field's front door.
    - bioinformatics           # 14.6k repos
    # Brand tier — 0 other repos hold this. Makes all 22 enumerable from one page:
    # https://github.com/topics/genefoundry
    - genefoundry

