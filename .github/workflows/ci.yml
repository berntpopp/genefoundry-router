name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format, lint, typecheck, tests, and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: "0.8.7"

      - name: Install dependencies
        run: uv sync --group dev --frozen

      # Source-only gate: validates the staged R-05 ledger without probing any backend.
      - name: Validate HTTP policy v1 adoption ledger
        run: make http-policy-adoption

      # Pinned actionlint (version + sha256) so `make ci-local`'s lint-actions target lints
      # every workflow in CI (F-01). The YAML-parse unit test is the always-on syntax guard.
      - name: Install actionlint (pinned)
        run: |
          set -euo pipefail
          VER=1.7.7
          SHA=023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
          curl -fsSL -o actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz"
          echo "${SHA}  actionlint.tgz" | sha256sum -c -
          tar -xzf actionlint.tgz actionlint
          sudo mv actionlint /usr/local/bin/actionlint
          actionlint --version

      # Static checks + a single parallel test run (xdist). Fast feedback on every PR.
      - name: Run CI checks (format, lint, typecheck, tests)
        run: make ci-local

      # Coverage gate runs only on push to main to avoid a second full test run on
      # every PR iteration (concurrency-cancel + this split are the compute savers).
      - name: Coverage gate
        if: github.event_name == 'push'
        run: make test-cov
