name: Container release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: container-release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    uses: ./.github/workflows/_container-release.yml
