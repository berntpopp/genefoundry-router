name: Reusable container release

on:
  workflow_call: {}

permissions: {}

jobs:
  prepare:
    name: Validate source and select recovery path
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    outputs:
      build_date: ${{ steps.state.outputs.build_date }}
      build_required: ${{ steps.state.outputs.build_required }}
      completed_release: ${{ steps.state.outputs.completed_release }}
      image: ${{ steps.state.outputs.image }}
      source_alias: ${{ steps.state.outputs.source_alias }}
      source_digest: ${{ steps.state.outputs.source_digest }}
      source_sha: ${{ steps.state.outputs.source_sha }}
      standard_sha: ${{ steps.state.outputs.standard_sha }}
      tag: ${{ steps.state.outputs.tag }}
      version: ${{ steps.state.outputs.version }}
    steps:
      - name: Verify called-workflow identity
        id: workflow-identity
        shell: bash
        env:
          JOB_CONTEXT: ${{ toJSON(job) }}
        run: |
          set -euo pipefail
          workflow_repository="$(jq -er ".workflow_repository" <<<"$JOB_CONTEXT")"
          workflow_ref="$(jq -er ".workflow_ref" <<<"$JOB_CONTEXT")"
          workflow_sha="$(jq -er ".workflow_sha" <<<"$JOB_CONTEXT")"
          test -n "$workflow_repository"
          test -n "$workflow_ref"
          test -n "$workflow_sha"
          test "$workflow_repository" = "berntpopp/genefoundry-router"
          case "$workflow_ref" in
            berntpopp/genefoundry-router/.github/workflows/_container-release.yml@*) ;;
            *) echo "unexpected called workflow: $workflow_ref" >&2; exit 1 ;;
          esac
          [[ "$workflow_sha" =~ ^[0-9a-f]{40}$ ]]
          echo "workflow_repository=$workflow_repository" >> "$GITHUB_OUTPUT"
          echo "workflow_sha=$workflow_sha" >> "$GITHUB_OUTPUT"
          echo "STANDARD_SHA=$workflow_sha" >> "$GITHUB_ENV"

      - name: Checkout exact tagged caller source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Checkout exact container standard revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ steps.workflow-identity.outputs.workflow_repository }}
          ref: ${{ steps.workflow-identity.outputs.workflow_sha }}
          path: .container-release-tools
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
          version: "0.8.7"

      - name: Install exact standard and pinned registry tools
        shell: bash
        run: |
          set -euo pipefail
          uv sync --project .container-release-tools --group dev --frozen
          gh_version=2.96.0
          gh_sha256=83d5c2ccad5498f58bf6368acb1ab32588cf43ab3a4b1c301bf36328b1c8bd60
          oras_version=1.3.3
          oras_sha256=9ce999f8d2de03fc03968b29d743077a58783e545e5eaa53917ca177352d0e59
          curl -fsSL --proto '=https' --tlsv1.2 -o "$RUNNER_TEMP/gh.tar.gz" \
            "https://github.com/cli/cli/releases/download/v${gh_version}/gh_${gh_version}_linux_amd64.tar.gz"
          echo "$gh_sha256  $RUNNER_TEMP/gh.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/gh.tar.gz" -C "$RUNNER_TEMP"
          install -m 0755 "$RUNNER_TEMP/gh_${gh_version}_linux_amd64/bin/gh" "$RUNNER_TEMP/gh"
          "$RUNNER_TEMP/gh" release verify --help >/dev/null
          "$RUNNER_TEMP/gh" release verify-asset --help >/dev/null
          "$RUNNER_TEMP/gh" attestation verify --help >/dev/null
          "$RUNNER_TEMP/gh" attestation download --help >/dev/null
          "$RUNNER_TEMP/gh" attestation trusted-root --help >/dev/null
          curl -fsSL --proto '=https' --tlsv1.2 -o "$RUNNER_TEMP/oras.tar.gz" \
            "https://github.com/oras-project/oras/releases/download/v${oras_version}/oras_${oras_version}_linux_amd64.tar.gz"
          echo "$oras_sha256  $RUNNER_TEMP/oras.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/oras.tar.gz" -C "$RUNNER_TEMP" oras
          chmod 0755 "$RUNNER_TEMP/oras"

      - name: Revalidate exact stable source tag
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = "push"
          [[ "$EVENT_REF" == refs/tags/* ]]
          tag="${EVENT_REF#refs/tags/}"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          uv run --project .container-release-tools \
            python .container-release-tools/scripts/container_release.py validate-source \
            --event-name "$GITHUB_EVENT_NAME" --event-ref "$EVENT_REF" \
            --event-sha "$EVENT_SHA" --changelog CHANGELOG.md

      - name: Enforce fleet release controls before publication
        shell: bash
        run: |
          set -euo pipefail
          uv run --project .container-release-tools python - <<'PY'
          from pathlib import Path

          from genefoundry_router.release.controls import (
              expected_fleet_repositories,
              load_control_ledger,
              require_compliant_controls,
          )

          standard = Path(".container-release-tools")
          require_compliant_controls(
              load_control_ledger(standard / "ci/container-controls.json"),
              expected_fleet_repositories(standard / "servers.yaml"),
          )
          PY

      - name: Resolve idempotent release state
        id: state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_REF: ${{ github.ref }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          gh="$RUNNER_TEMP/gh"
          oras="$RUNNER_TEMP/oras"
          tag="${EVENT_REF#refs/tags/}"
          version="${tag#v}"
          test "$(uv version --short)" = "$version"
          source_sha="$EVENT_SHA"
          build_date="$(git show -s --format=%cI "$source_sha")"
          source_alias="sha-$source_sha"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          build_required=true
          source_digest=""
          completed_release=false

          if descriptor="$($oras manifest fetch --descriptor "$image:$source_alias" 2>/dev/null)"; then
            source_digest="$(jq -er '.digest | select(test("^sha256:[0-9a-f]{64}$"))' <<<"$descriptor")"
            manifest="$($oras manifest fetch "$image@$source_digest")"
            config_digest="$(jq -er '.config.digest' <<<"$manifest")"
            config="$($oras blob fetch "$image@$source_digest" "$config_digest")"
            revision="$(jq -er '.config.Labels["org.opencontainers.image.revision"]' <<<"$config")"
            test "$revision" = "$source_sha" || {
              echo "source alias collision" >&2
              exit 1
            }
            build_required=false
          fi

          if version_descriptor="$($oras manifest fetch --descriptor "$image:$version" 2>/dev/null)"; then
            version_digest="$(jq -er '.digest' <<<"$version_descriptor")"
            if [ -z "$source_digest" ] || [ "$version_digest" != "$source_digest" ]; then
              echo "version alias collision" >&2
              exit 1
            fi
          fi

          if release_json="$($gh release view "$tag" --json isDraft,tagName 2>/dev/null)" && \
             [ "$(jq -r .isDraft <<<"$release_json")" = false ]; then
            for attempt in $(seq 1 30); do
              $gh release verify "$tag" && break
              echo "release attestation not yet published; retry $attempt"
              sleep 10
            done
            if ! $gh attestation verify "oci://$image@$source_digest" \
              --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "missing attestation" >&2
              exit 1
            fi
            completed_release=true
          fi

          {
            echo "build_required=$build_required"
            echo "build_date=$build_date"
            echo "completed_release=$completed_release"
            echo "image=$image"
            echo "source_alias=$source_alias"
            echo "source_digest=$source_digest"
            echo "source_sha=$source_sha"
            echo "standard_sha=$STANDARD_SHA"
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

  build-gate:
    name: Build once or import, then gate exact OCI layout
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
      image_digest: ${{ steps.evidence.outputs.image_digest }}
    env:
      CI_IMAGE: release-gate:${{ needs.prepare.outputs.source_sha }}
      IMAGE: ${{ needs.prepare.outputs.image }}
      SOURCE_ALIAS: ${{ needs.prepare.outputs.source_alias }}
      SOURCE_DIGEST: ${{ needs.prepare.outputs.source_digest }}
      COMPOSE_OVERRIDE: compose.release-gate.yml
      COMPOSE_PROJECT_NAME: genefoundry-release-gate-${{ github.run_id }}-${{ github.run_attempt }}
      # The `runner` context is NOT available in a job-level `env:` block; using it there is
      # an invalid-context error that kills the whole run before a single job starts. The
      # smoke paths are therefore derived from $RUNNER_TEMP inside each step.
    steps:
      - name: Checkout exact tagged caller source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Checkout exact container standard revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: berntpopp/genefoundry-router
          ref: ${{ needs.prepare.outputs.standard_sha }}
          path: .container-release-tools
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
          version: "0.8.7"

      - name: Install exact standard tools
        run: uv sync --project .container-release-tools --group dev --frozen

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.0.0

      - name: Prepare immutable evidence directory
        id: evidence-paths
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-build"
          echo "OCI_ARCHIVE=$RUNNER_TEMP/release-build/image.oci.tar" >> "$GITHUB_ENV"
          echo "OCI_LAYOUT=$RUNNER_TEMP/release-build/oci-layout" >> "$GITHUB_ENV"
          echo "archive=$RUNNER_TEMP/release-build/image.oci.tar" >> "$GITHUB_OUTPUT"

      - name: Build production OCI layout exactly once
        if: ${{ needs.prepare.outputs.build_required == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: .
          file: docker/Dockerfile
          target: production
          platforms: linux/amd64
          tags: ${{ needs.prepare.outputs.source_alias }}
          outputs: type=oci,dest=${{ steps.evidence-paths.outputs.archive }}
          push: false
          provenance: false
          sbom: false
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.version }}
            VCS_REF=${{ needs.prepare.outputs.source_sha }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}

      - name: Import matching source alias without rebuilding
        if: ${{ needs.prepare.outputs.build_required == 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          version=1.3.3
          sha256=9ce999f8d2de03fc03968b29d743077a58783e545e5eaa53917ca177352d0e59
          curl -fsSL --proto '=https' --tlsv1.2 -o "$RUNNER_TEMP/oras.tar.gz" \
            "https://github.com/oras-project/oras/releases/download/v${version}/oras_${version}_linux_amd64.tar.gz"
          echo "$sha256  $RUNNER_TEMP/oras.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/oras.tar.gz" -C "$RUNNER_TEMP" oras
          mkdir -p "$OCI_LAYOUT"
          "$RUNNER_TEMP/oras" cp --to-oci-layout "$IMAGE@$SOURCE_DIGEST" "$OCI_LAYOUT:$SOURCE_ALIAS"
          tar -C "$OCI_LAYOUT" -cf "$OCI_ARCHIVE" .

      - name: Verify layout digest and inspect every layer and config
        id: evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$OCI_LAYOUT"
          if [ ! -f "$OCI_LAYOUT/index.json" ]; then tar -xf "$OCI_ARCHIVE" -C "$OCI_LAYOUT"; fi
          mapfile -t image_allowlist < <(jq -er '.data.image_allowlist[]?' container-release.json)
          allowlist_args=()
          for allowed_path in "${image_allowlist[@]}"; do
            allowlist_args+=(--allowlist "$allowed_path")
          done
          uv run --project .container-release-tools \
            python .container-release-tools/scripts/container_release.py inspect-oci \
            --layout "$OCI_LAYOUT" "${allowlist_args[@]}" \
            > "$RUNNER_TEMP/release-build/content-report.json"
          image_digest="$(jq -er '.manifests | select(length == 1) | .[0].digest | select(test("^sha256:[0-9a-f]{64}$"))' "$OCI_LAYOUT/index.json")"
          if [ -n "$SOURCE_DIGEST" ]; then test "$image_digest" = "$SOURCE_DIGEST"; fi
          manifest_hex="${image_digest#sha256:}"
          cp "$OCI_LAYOUT/blobs/sha256/$manifest_hex" "$RUNNER_TEMP/release-build/image-manifest.json"
          echo "image_digest=$image_digest" >> "$GITHUB_OUTPUT"

      - name: Install pinned OCI importer
        shell: bash
        run: |
          set -euo pipefail
          version=1.23.0
          sha256=15696e068c02a163e20013fab79f40cdc6c8022d99e1aee8676f6d540404691a
          curl -fsSL --proto '=https' --tlsv1.2 -o "$RUNNER_TEMP/skopeo" \
            "https://github.com/lework/skopeo-binary/releases/download/v${version}/skopeo-linux-amd64"
          echo "$sha256  $RUNNER_TEMP/skopeo" | sha256sum -c -
          chmod 0755 "$RUNNER_TEMP/skopeo"
          "$RUNNER_TEMP/skopeo" --insecure-policy copy "oci-archive:$OCI_ARCHIVE" "docker-daemon:$CI_IMAGE"

      - name: Prepare declared smoke fixtures
        id: prepare-smoke
        shell: bash
        run: |
          set -euo pipefail
          SMOKE_ENV_FILE="$RUNNER_TEMP/smoke.env"
          SMOKE_EFFECTIVE_ENV="$RUNNER_TEMP/smoke-effective.env"
          SMOKE_FIXTURE_DIR="$RUNNER_TEMP/smoke-fixtures"
          : > "$SMOKE_ENV_FILE"
          mkdir -p "$SMOKE_FIXTURE_DIR"
          preparation="$(jq -r '.preparation // empty' container-release.json)"
          if [ -z "$preparation" ]; then
            echo "no preparation hook declared"
            exit 0
          fi
          # The model already constrains `preparation` to this one reviewable path; assert
          # it here too so a config schema regression can never widen it to arbitrary shell.
          test "$preparation" = "docker/ci-prepare-smoke.sh"
          test -f "$preparation" && test ! -L "$preparation"
          # Runs with `contents: read` only: no secrets, no OIDC, no package write.
          env -i PATH="$PATH" HOME="$HOME" \
            GF_SMOKE_FIXTURE_DIR="$SMOKE_FIXTURE_DIR" \
            GF_SMOKE_ENV_FILE="$SMOKE_ENV_FILE" \
            bash "$preparation"
          # Later steps consume the fixtures but never re-execute the script.
          find "$SMOKE_FIXTURE_DIR" -type f -print0 | sort -z \
            | xargs -0 -r sha256sum > "$RUNNER_TEMP/fixture-manifest.sha256"
          cat "$RUNNER_TEMP/fixture-manifest.sha256"

      - name: Generate the no-build smoke stack for the exact gated image
        shell: bash
        run: |
          set -euo pipefail
          SMOKE_ENV_FILE="$RUNNER_TEMP/smoke.env"
          SMOKE_EFFECTIVE_ENV="$RUNNER_TEMP/smoke-effective.env"
          SMOKE_FIXTURE_DIR="$RUNNER_TEMP/smoke-fixtures"
          service="$(jq -er '.service.name' container-release.json)"
          compose_args=()
          while IFS= read -r file; do
            compose_args+=(-f "$file")
          done < <(jq -r '.service.compose_files[]' container-release.json)
          # The deployed contract names the image through one required variable. Resolve that
          # same variable to the exact image gated in this run, so the stack can never rebuild
          # or pull anything else.
          image_template="$(docker compose --project-name "$service" "${compose_args[@]}" \
            config --no-interpolate --format json \
            | jq -er --arg service "$service" '.services[$service].image')"
          [[ "$image_template" =~ ^\$\{([A-Z][A-Z0-9_]*):\?[^\}]+\}$ ]]
          image_variable="${BASH_REMATCH[1]}"
          uv run --project .container-release-tools \
            python .container-release-tools/scripts/container_release.py render-smoke-override \
            --config container-release.json --image "$CI_IMAGE" --host-port 18000 \
            --env-file "$SMOKE_ENV_FILE" --servers servers.yaml --out "$COMPOSE_OVERRIDE"
          # The smoke stack resolves required base-compose variables from the prepared
          # fixture first, then from an inert placeholder.
          smoke_env_args=()
          while IFS='=' read -r key value; do
            [ -n "$key" ] && smoke_env_args+=("$key=$value")
          done < "$SMOKE_ENV_FILE"
          while read -r variable required _; do
            if [ "$required" = true ] && ! grep -q "^$variable=" "$SMOKE_ENV_FILE"; then
              value=example.test
              if [ "$variable" = "$image_variable" ]; then value="$CI_IMAGE"; fi
              smoke_env_args+=("$variable=$value")
            fi
          done < <(docker compose "${compose_args[@]}" config --variables | tail -n +2)
          printf '%s\n' "${smoke_env_args[@]}" > "$SMOKE_EFFECTIVE_ENV"
          base_compose="$(jq -er '.service.compose_files[0]' container-release.json)"
          docker compose --env-file "$SMOKE_EFFECTIVE_ENV" \
            -f "$base_compose" -f "$COMPOSE_OVERRIDE" \
            config --format json > "$RUNNER_TEMP/compose-smoke.json"

      - name: Start the declared smoke stack without rebuilding
        shell: bash
        run: |
          set -euo pipefail
          SMOKE_ENV_FILE="$RUNNER_TEMP/smoke.env"
          SMOKE_EFFECTIVE_ENV="$RUNNER_TEMP/smoke-effective.env"
          SMOKE_FIXTURE_DIR="$RUNNER_TEMP/smoke-fixtures"
          service="$(jq -er '.service.name' container-release.json)"
          timeout="$(jq -er '.service.startup_timeout_seconds' container-release.json)"
          base_compose="$(jq -er '.service.compose_files[0]' container-release.json)"
          # Re-verify every prepared fixture immediately before it is mounted.
          if [ -s "$RUNNER_TEMP/fixture-manifest.sha256" ]; then
            sha256sum -c "$RUNNER_TEMP/fixture-manifest.sha256"
          fi
          # Compose starts every declared sidecar through the application's depends_on graph
          # and honours service_completed_successfully / service_healthy before the app runs.
          # A bare `docker run` started the application alone, with no database and an empty
          # data volume, so every data-bearing backend passed CI and then failed this gate —
          # and a release tag is immutable, so each failure burned a version.
          docker compose --env-file "$SMOKE_EFFECTIVE_ENV" \
            -f "$base_compose" -f "$COMPOSE_OVERRIDE" \
            up --detach --no-build --wait --wait-timeout "$timeout" "$service"

      - name: Gate health MCP and hardening on the composed application container
        shell: bash
        run: |
          set -euo pipefail
          SMOKE_ENV_FILE="$RUNNER_TEMP/smoke.env"
          SMOKE_EFFECTIVE_ENV="$RUNNER_TEMP/smoke-effective.env"
          SMOKE_FIXTURE_DIR="$RUNNER_TEMP/smoke-fixtures"
          service="$(jq -er '.service.name' container-release.json)"
          base_compose="$(jq -er '.service.compose_files[0]' container-release.json)"
          # Honour the declared probe paths. Hardcoding /health and /mcp silently probed the
          # wrong endpoint for any backend that serves a different path (stringdb declares
          # /api/health).
          health_path="$(jq -er '.service.health_path' container-release.json)"
          mcp_path="$(jq -er '.service.mcp_path' container-release.json)"
          curl -fsS -H 'Host: localhost' \
            "http://127.0.0.1:18000$health_path" > "$RUNNER_TEMP/release-gate-health.json"
          curl -fsS -D "$RUNNER_TEMP/mcp.headers" -o "$RUNNER_TEMP/mcp-init.json" \
            -H 'Host: localhost' -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"release-gate","version":"1"}}}' \
            "http://127.0.0.1:18000$mcp_path"
          grep -Fq '"result"' "$RUNNER_TEMP/mcp-init.json"
          grep -Fq '"serverInfo"' "$RUNNER_TEMP/mcp-init.json"
          # The hardening invariants are asserted against the container Compose started, which
          # is the one that just served /health and MCP initialize.
          container_id="$(docker compose --env-file "$SMOKE_EFFECTIVE_ENV" \
            -f "$base_compose" -f "$COMPOSE_OVERRIDE" ps -q "$service")"
          test -n "$container_id"
          docker inspect "$container_id" > "$RUNNER_TEMP/release-gate-inspect.json"
          inspect="$RUNNER_TEMP/release-gate-inspect.json"
          jq -e '.[0].Config.User != "" and .[0].Config.User != "0" and .[0].Config.User != "root"' "$inspect"
          jq -e '.[0].HostConfig.ReadonlyRootfs == true' "$inspect"
          jq -e '.[0].HostConfig.CapDrop | index("ALL") != null' "$inspect"
          jq -e '.[0].HostConfig.SecurityOpt | any(. == "no-new-privileges:true")' "$inspect"
          jq -e '.[0].HostConfig.PidsLimit > 0 and .[0].HostConfig.Memory > 0' "$inspect"

      - name: Tear down smoke stack
        id: teardown
        if: ${{ always() }}
        shell: bash
        run: |
          SMOKE_EFFECTIVE_ENV="$RUNNER_TEMP/smoke-effective.env"
          base_compose="$(jq -er '.service.compose_files[0]' container-release.json 2>/dev/null || true)"
          if [ -n "$base_compose" ] && [ -f "$COMPOSE_OVERRIDE" ] && [ -f "$SMOKE_EFFECTIVE_ENV" ]; then
            docker compose --env-file "$SMOKE_EFFECTIVE_ENV" \
              -f "$base_compose" -f "$COMPOSE_OVERRIDE" \
              down --volumes --remove-orphans || true
          fi
          # The gated image itself must survive: the scanner and the SBOM still read it.

      - name: Scan exact image to Trivy JSON
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.35.0
        with:
          image-ref: ${{ env.CI_IMAGE }}
          format: json
          output: ${{ runner.temp }}/release-build/trivy-native.json
          exit-code: "0"
          vuln-type: os,library
          cache-dir: ${{ github.workspace }}/.cache/trivy

      - name: Evaluate versioned Trivy policy
        if: ${{ always() }}
        shell: bash
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy
        run: |
          set -euo pipefail
          scanner_exit=3
          if [ "${{ steps.trivy.outcome }}" = success ]; then scanner_exit=0; fi
          if [ "$scanner_exit" -eq 0 ]; then
            trivy version --format json > "$RUNNER_TEMP/release-build/trivy-version.json"
          else
            test -f "$RUNNER_TEMP/release-build/trivy-native.json" || \
              printf '{}\n' > "$RUNNER_TEMP/release-build/trivy-native.json"
            printf '{}\n' > "$RUNNER_TEMP/release-build/trivy-version.json"
          fi
          jq -n \
            --slurpfile scan "$RUNNER_TEMP/release-build/trivy-native.json" \
            --slurpfile version "$RUNNER_TEMP/release-build/trivy-version.json" \
            '{schema_version: 1, scan: $scan[0], version: $version[0]}' \
            > "$RUNNER_TEMP/release-build/trivy.json"
          uv run --project .container-release-tools \
            python .container-release-tools/scripts/container_release.py evaluate-trivy \
            --report "$RUNNER_TEMP/release-build/trivy.json" --scanner-exit "$scanner_exit" \
            --out "$RUNNER_TEMP/release-build/trivy-verdict.json"

      - name: Generate SPDX JSON SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.CI_IMAGE }}
          format: spdx-json
          output-file: ${{ runner.temp }}/release-build/sbom.spdx.json
          upload-artifact: false

      - name: Seal immutable build evidence
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/release-build"
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload immutable OCI layout and evidence
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: release-build-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 2
          path: ${{ runner.temp }}/release-build

  publish-attest:
    name: Publish exact manifest and attest
    needs: [prepare, build-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      published_digest: ${{ steps.publish.outputs.published_digest }}
      published_digest_hex: ${{ steps.publish.outputs.published_digest_hex }}
    env:
      IMAGE: ${{ needs.prepare.outputs.image }}
      SOURCE_ALIAS: ${{ needs.prepare.outputs.source_alias }}
      EXPECTED_DIGEST: ${{ needs.build-gate.outputs.image_digest }}
    steps:
      - name: Download immutable build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.3.0
        with:
          name: release-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release-build

      - name: Verify immutable OCI evidence before credentials
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/release-build"
          sha256sum -c SHA256SUMS
          test "$(jq -er '.manifests | select(length == 1) | .[0].digest' oci-layout/index.json)" = "$EXPECTED_DIGEST"

      - name: Install checksum-pinned gh and ORAS
        shell: bash
        run: |
          set -euo pipefail
          gh_version=2.96.0
          gh_sha256=83d5c2ccad5498f58bf6368acb1ab32588cf43ab3a4b1c301bf36328b1c8bd60
          oras_version=1.3.3
          oras_sha256=9ce999f8d2de03fc03968b29d743077a58783e545e5eaa53917ca177352d0e59
          curl -fsSL --proto '=https' --tlsv1.2 -o "$RUNNER_TEMP/gh.tar.gz" \
            "https://github.com/cli/cli/releases/download/v${gh_version}/gh_${gh_version}_linux_amd64.tar.gz"
          echo "$gh_sha256  $RUNNER_TEMP/gh.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/gh.tar.gz" -C "$RUNNER_TEMP"
          install -m 0755 "$RUNNER_TEMP/gh_${gh_version}_linux_amd64/bin/gh" "$RUNNER_TEMP/gh"
          "$RUNNER_TEMP/gh" release verify --help >/dev/null
          "$RUNNER_TEMP/gh" release verify-asset --help >/dev/null
          "$RUNNER_TEMP/gh" attestation verify --help >/dev/null
          "$RUNNER_TEMP/gh" attestation download --help >/dev/null
          "$RUNNER_TEMP/gh" attestation trusted-root --help >/dev/null
          curl -fsSL --proto '=https' --tlsv1.2 -o "$RUNNER_TEMP/oras.tar.gz" \
            "https://github.com/oras-project/oras/releases/download/v${oras_version}/oras_${oras_version}_linux_amd64.tar.gz"
          echo "$oras_sha256  $RUNNER_TEMP/oras.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/oras.tar.gz" -C "$RUNNER_TEMP" oras
          chmod 0755 "$RUNNER_TEMP/oras"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish source-SHA alias and prove registry digest
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          oras="$RUNNER_TEMP/oras"
          # Address the layout by the exact digest already gated above, not by a ref name.
          # A fresh buildx `type=oci` export normalizes a bare tag and annotates the manifest
          # `org.opencontainers.image.ref.name: latest`, so the source alias never resolves;
          # only the recovery path writes that ref. The digest is identical on both paths.
          $oras cp --from-oci-layout \
            "$RUNNER_TEMP/release-build/oci-layout@$EXPECTED_DIGEST" "$IMAGE:$SOURCE_ALIAS"
          published_digest="$($oras manifest fetch --descriptor "$IMAGE:$SOURCE_ALIAS" | jq -er .digest)"
          test "$published_digest" = "$EXPECTED_DIGEST" || {
            echo "source alias digest mismatch" >&2
            exit 1
          }
          echo "published_digest=$published_digest" >> "$GITHUB_OUTPUT"
          echo "published_digest_hex=${published_digest#sha256:}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v4.1.0
        with:
          subject-name: ${{ needs.prepare.outputs.image }}
          subject-digest: sha256:${{ steps.publish.outputs.published_digest_hex }}
          push-to-registry: true
          show-summary: true

      - name: Attest SPDX SBOM
        uses: actions/attest-sbom@51e74621a501c89df81fc1391c5a8f4cfc9fab2f # v4.0.0
        with:
          subject-name: ${{ needs.prepare.outputs.image }}
          subject-digest: sha256:${{ steps.publish.outputs.published_digest_hex }}
          sbom-path: ${{ runner.temp }}/release-build/sbom.spdx.json
          push-to-registry: true
          show-summary: true

      - name: Verify published attestations and retain bundle
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/attestation-evidence"
          "$RUNNER_TEMP/gh" attestation verify "oci://$IMAGE@$EXPECTED_DIGEST" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow berntpopp/genefoundry-router/.github/workflows/_container-release.yml \
            --signer-digest "${{ needs.prepare.outputs.standard_sha }}" \
            --source-ref "refs/tags/${{ needs.prepare.outputs.tag }}" \
            --source-digest "${{ needs.prepare.outputs.source_sha }}" \
            --predicate-type https://slsa.dev/provenance/v1 --deny-self-hosted-runners \
            --format json > "$RUNNER_TEMP/attestation-evidence/provenance-verification.json"
          "$RUNNER_TEMP/gh" attestation verify "oci://$IMAGE@$EXPECTED_DIGEST" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow berntpopp/genefoundry-router/.github/workflows/_container-release.yml \
            --signer-digest "${{ needs.prepare.outputs.standard_sha }}" \
            --source-ref "refs/tags/${{ needs.prepare.outputs.tag }}" \
            --source-digest "${{ needs.prepare.outputs.source_sha }}" \
            --predicate-type https://spdx.dev/Document/v2.3 --deny-self-hosted-runners \
            --format json > "$RUNNER_TEMP/attestation-evidence/spdx-verification.json"
          jq -n \
            --slurpfile provenance "$RUNNER_TEMP/attestation-evidence/provenance-verification.json" \
            --slurpfile spdx "$RUNNER_TEMP/attestation-evidence/spdx-verification.json" \
            '{provenance:$provenance[0], spdx:$spdx[0]}' \
            > "$RUNNER_TEMP/attestation-evidence/verification.json"
          (
            cd "$RUNNER_TEMP/attestation-evidence"
            "$RUNNER_TEMP/gh" attestation download "oci://$IMAGE@$EXPECTED_DIGEST" \
              --repo "$GITHUB_REPOSITORY" --limit 30
            bundle_file="$(find . -maxdepth 1 -type f \( -name 'sha256:*.jsonl' -o -name 'sha256-*.jsonl' \) -print -quit)"
            test -n "$bundle_file"
            mv "$bundle_file" attestation-bundle.json
          )
          "$RUNNER_TEMP/gh" attestation trusted-root \
            > "$RUNNER_TEMP/attestation-evidence/trusted-root.json"
          test -s "$RUNNER_TEMP/attestation-evidence/attestation-bundle.json"
          test -s "$RUNNER_TEMP/attestation-evidence/trusted-root.json"
          cp "$RUNNER_TEMP/release-build/image-manifest.json" "$RUNNER_TEMP/attestation-evidence/image-manifest.json"
          rm -f "$RUNNER_TEMP/attestation-evidence/provenance-verification.json" \
            "$RUNNER_TEMP/attestation-evidence/spdx-verification.json"
          cd "$RUNNER_TEMP/attestation-evidence"
          sha256sum ./*.json > SHA256SUMS

      - name: Upload attestation evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: release-attest-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 2
          path: ${{ runner.temp }}/attestation-evidence

  capture:
    name: Capture MCP definitions from published digest
    needs: [prepare, publish-attest]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    env:
      PUBLISHED_DIGEST: ${{ needs.publish-attest.outputs.published_digest }}
      IMAGE: ${{ needs.prepare.outputs.image }}
      COMPOSE_PROJECT_PREFIX: gf-release-capture-${{ github.run_id }}-${{ github.run_attempt }}
      # The `runner` context is NOT available in a job-level `env:` block; using it there is
      # an invalid-context error that kills the whole run before a single job starts. The
      # smoke paths are therefore derived from $RUNNER_TEMP inside each step.
    steps:
      - name: Checkout exact tagged caller source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Checkout exact container standard revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: berntpopp/genefoundry-router
          ref: ${{ needs.prepare.outputs.standard_sha }}
          path: .container-release-tools
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
          version: "0.8.7"

      - name: Prepare declared smoke fixtures
        id: prepare-smoke
        shell: bash
        run: |
          set -euo pipefail
          SMOKE_ENV_FILE="$RUNNER_TEMP/smoke.env"
          SMOKE_EFFECTIVE_ENV="$RUNNER_TEMP/smoke-effective.env"
          SMOKE_FIXTURE_DIR="$RUNNER_TEMP/smoke-fixtures"
          : > "$SMOKE_ENV_FILE"
          mkdir -p "$SMOKE_FIXTURE_DIR"
          preparation="$(jq -r '.preparation // empty' container-release.json)"
          if [ -z "$preparation" ]; then
            echo "no preparation hook declared"
            exit 0
          fi
          # The model already constrains `preparation` to this one reviewable path; assert
          # it here too so a config schema regression can never widen it to arbitrary shell.
          test "$preparation" = "docker/ci-prepare-smoke.sh"
          test -f "$preparation" && test ! -L "$preparation"
          # Runs with `contents: read` and `packages: read` only: no secrets, no OIDC.
          env -i PATH="$PATH" HOME="$HOME" \
            GF_SMOKE_FIXTURE_DIR="$SMOKE_FIXTURE_DIR" \
            GF_SMOKE_ENV_FILE="$SMOKE_ENV_FILE" \
            bash "$preparation"
          # Later steps consume the fixtures but never re-execute the script.
          find "$SMOKE_FIXTURE_DIR" -type f -print0 | sort -z \
            | xargs -0 -r sha256sum > "$RUNNER_TEMP/fixture-manifest.sha256"
          cat "$RUNNER_TEMP/fixture-manifest.sha256"

      - name: Pull and capture definitions from the published digest stack
        shell: bash
        run: |
          set -euo pipefail
          SMOKE_ENV_FILE="$RUNNER_TEMP/smoke.env"
          SMOKE_EFFECTIVE_ENV="$RUNNER_TEMP/smoke-effective.env"
          SMOKE_FIXTURE_DIR="$RUNNER_TEMP/smoke-fixtures"
          uv sync --project .container-release-tools --group dev --frozen
          docker pull "$IMAGE@${PUBLISHED_DIGEST}"
          service="$(jq -er '.service.name' container-release.json)"
          timeout="$(jq -er '.service.startup_timeout_seconds' container-release.json)"
          health_path="$(jq -er '.service.health_path' container-release.json)"
          mcp_path="$(jq -er '.service.mcp_path' container-release.json)"
          base_compose="$(jq -er '.service.compose_files[0]' container-release.json)"
          compose_args=()
          while IFS= read -r file; do
            compose_args+=(-f "$file")
          done < <(jq -r '.service.compose_files[]' container-release.json)
          # Resolve the deployed contract's required image variable to the published digest,
          # so the stack runs exactly the manifest that was gated, attested, and pushed.
          image_template="$(docker compose --project-name "$service" "${compose_args[@]}" \
            config --no-interpolate --format json \
            | jq -er --arg service "$service" '.services[$service].image')"
          [[ "$image_template" =~ ^\$\{([A-Z][A-Z0-9_]*):\?[^\}]+\}$ ]]
          image_variable="${BASH_REMATCH[1]}"
          smoke_env_args=()
          while IFS='=' read -r key value; do
            [ -n "$key" ] && smoke_env_args+=("$key=$value")
          done < "$SMOKE_ENV_FILE"
          while read -r variable required _; do
            if [ "$required" = true ] && ! grep -q "^$variable=" "$SMOKE_ENV_FILE"; then
              value=example.test
              if [ "$variable" = "$image_variable" ]; then
                value="$IMAGE@$PUBLISHED_DIGEST"
              fi
              smoke_env_args+=("$variable=$value")
            fi
          done < <(docker compose "${compose_args[@]}" config --variables | tail -n +2)
          printf '%s\n' "${smoke_env_args[@]}" > "$SMOKE_EFFECTIVE_ENV"
          if [ -s "$RUNNER_TEMP/fixture-manifest.sha256" ]; then
            sha256sum -c "$RUNNER_TEMP/fixture-manifest.sha256"
          fi
          mkdir -p "$RUNNER_TEMP/capture"
          # Two contexts prove the definitions are stable. Each is a whole Compose stack with
          # its own sidecars and named volumes, so each gets its own project name as well as
          # its own loopback port; the two can never collide.
          capture_tools() {
            local label="$1"
            local host_port="$2"
            local tools_json="$3"
            local context_json="$4"
            local project="${COMPOSE_PROJECT_PREFIX}-${label}"
            local override="compose.release-capture-${label}.yml"
            uv run --project .container-release-tools \
              python .container-release-tools/scripts/container_release.py render-smoke-override \
              --config container-release.json --image "$IMAGE@$PUBLISHED_DIGEST" \
              --host-port "$host_port" --env-file "$SMOKE_ENV_FILE" --servers servers.yaml \
              --out "$override"
            # Registered before the stack starts, so a failed `up` is torn down as well.
            trap 'docker compose --project-name "$project" --env-file "$SMOKE_EFFECTIVE_ENV" -f "$base_compose" -f "$override" down --volumes --remove-orphans >/dev/null 2>&1 || true' RETURN
            # Compose starts every declared sidecar through the application's depends_on graph
            # and honours service_completed_successfully / service_healthy before the app runs.
            docker compose --project-name "$project" --env-file "$SMOKE_EFFECTIVE_ENV" \
              -f "$base_compose" -f "$override" \
              up --detach --no-build --wait --wait-timeout "$timeout" "$service"
            curl -fsS -H 'Host: localhost' \
              "http://127.0.0.1:${host_port}${health_path}" \
              > "$RUNNER_TEMP/capture/${label}-health.json"
            curl -fsS -D "$RUNNER_TEMP/capture/${label}.headers" \
              -o "$RUNNER_TEMP/capture/${label}-initialize.json" \
              -H 'Host: localhost' -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"release-capture","version":"1"}}}' \
              "http://127.0.0.1:${host_port}${mcp_path}"
            grep -Fq '"serverInfo"' "$RUNNER_TEMP/capture/${label}-initialize.json"
            session="$(awk 'tolower($1) == "mcp-session-id:" {gsub("\\r", "", $2); print $2}' "$RUNNER_TEMP/capture/${label}.headers")"
            session_args=()
            if [ -n "$session" ]; then
              session_args=(-H "Mcp-Session-Id: $session")
            fi
            curl -fsS -o "$RUNNER_TEMP/capture/${label}-tools-response.json" \
              -H 'Host: localhost' -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              "${session_args[@]}" \
              --data '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
              "http://127.0.0.1:${host_port}${mcp_path}"
            jq -er '.result.tools | type == "array" and length > 0' \
              "$RUNNER_TEMP/capture/${label}-tools-response.json" >/dev/null
            jq -c '.result.tools' "$RUNNER_TEMP/capture/${label}-tools-response.json" \
              > "$tools_json"
            jq -n --arg label "$label" --arg image "$IMAGE" --arg digest "$PUBLISHED_DIGEST" \
              --argjson port "$host_port" \
              '{runtime:"published-ghcr-digest", capture:$label, image:$image, digest:$digest, port:$port}' \
              > "$context_json"
          }
          # Prove the contract the repository actually declares, and capture the number of
          # runtime contexts that contract requires. data-independent must show the
          # definitions are identical across TWO distinct contexts; data-bound must bind
          # exactly ONE capture to the declared data identity. The library enforces both
          # counts, so the shell has to branch -- passing two captures with a data-bound
          # contract fails, and it fails after publish-attest has already pushed the image.
          contract="$(jq -er '.definitions.contract' container-release.json)"
          capture_tools a 18000 "$RUNNER_TEMP/capture/mcp-tools-a.json" \
            "$RUNNER_TEMP/capture/context-a.json"
          capture_args=(
            --tools "$RUNNER_TEMP/capture/mcp-tools-a.json"
            --context "$RUNNER_TEMP/capture/context-a.json"
          )
          data_identity_args=()
          if [ "$contract" = "data-bound" ]; then
            data_identity_args=(
              --data-release-tag "$(jq -er '.data.release_tag' container-release.json)"
              --data-digest "$(jq -er '.data.digest' container-release.json)"
            )
          else
            capture_tools b 18001 "$RUNNER_TEMP/capture/mcp-tools-b.json" \
              "$RUNNER_TEMP/capture/context-b.json"
            capture_args+=(
              --tools "$RUNNER_TEMP/capture/mcp-tools-b.json"
              --context "$RUNNER_TEMP/capture/context-b.json"
            )
          fi
          uv run --project .container-release-tools \
            python .container-release-tools/scripts/container_release.py capture-definitions \
            "${capture_args[@]}" \
            --contract "$contract" "${data_identity_args[@]}" \
            --out-definitions "$RUNNER_TEMP/capture/mcp-definitions.json" \
            --out-context "$RUNNER_TEMP/capture/mcp-capture-context.json"
          # Project the declared data requirements here, where the caller source exists.
          # assemble-evidence deliberately checks out no caller source -- it consumes only
          # sealed artifacts -- so the contract must reach it as sealed evidence, never by
          # reading container-release.json from a workspace it does not have.
          jq -e '.data
            | {mode}
            + (if has("release_tag") then {release_tag, digest} else {} end)
            + (if has("reproducible_rollback") then {reproducible_rollback} else {} end)
            + {schema_compatibility: (.schema_compatibility // [])}' \
            container-release.json > "$RUNNER_TEMP/capture/data-requirements.json"
          cd "$RUNNER_TEMP/capture"
          sha256sum mcp-definitions.json mcp-capture-context.json data-requirements.json > SHA256SUMS

      - name: Tear down smoke stack
        id: teardown
        if: ${{ always() }}
        shell: bash
        run: |
          SMOKE_EFFECTIVE_ENV="$RUNNER_TEMP/smoke-effective.env"
          base_compose="$(jq -er '.service.compose_files[0]' container-release.json 2>/dev/null || true)"
          for label in a b; do
            override="compose.release-capture-${label}.yml"
            if [ -n "$base_compose" ] && [ -f "$override" ] && [ -f "$SMOKE_EFFECTIVE_ENV" ]; then
              docker compose --project-name "${COMPOSE_PROJECT_PREFIX}-${label}" \
                --env-file "$SMOKE_EFFECTIVE_ENV" -f "$base_compose" -f "$override" \
                down --volumes --remove-orphans || true
            fi
          done

      - name: Upload published definition capture
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: release-capture-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 2
          path: ${{ runner.temp }}/capture

  assemble-evidence:
    name: Assemble final read-only evidence
    needs: [prepare, build-gate, publish-attest, capture]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
    steps:
      - name: Checkout exact container standard revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: berntpopp/genefoundry-router
          ref: ${{ needs.prepare.outputs.standard_sha }}
          path: .container-release-tools
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
          version: "0.8.7"

      - name: Download build evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.3.0
        with:
          name: release-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/build

      - name: Download attestation evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.3.0
        with:
          name: release-attest-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/attest

      - name: Download MCP capture
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.3.0
        with:
          name: release-capture-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/capture

      - name: Assemble and seal final release evidence
        shell: bash
        run: |
          set -euo pipefail
          uv sync --project .container-release-tools --group dev --frozen
          mkdir -p "$RUNNER_TEMP/final/assets"
          cp "$RUNNER_TEMP/build/sbom.spdx.json" "$RUNNER_TEMP/final/assets/sbom.spdx.json"
          cp "$RUNNER_TEMP/build/trivy.json" "$RUNNER_TEMP/final/assets/trivy.json"
          cp "$RUNNER_TEMP/attest"/*.json "$RUNNER_TEMP/final/assets/"
          cp "$RUNNER_TEMP/capture/mcp-"*.json "$RUNNER_TEMP/final/assets/"
          cp "$RUNNER_TEMP/capture/mcp-"*.json "$RUNNER_TEMP/final/"
          printf '%s\n' \
            '{"repository":"${{ github.repository }}","version":"${{ needs.prepare.outputs.version }}","source_tag":"${{ needs.prepare.outputs.tag }}","source_revision":"${{ needs.prepare.outputs.source_sha }}","image_name":"${{ needs.prepare.outputs.image }}","image_digest":"${{ needs.publish-attest.outputs.published_digest }}","workflow_caller":"${{ github.repository }}/.github/workflows/container-release.yml","workflow_standard":"berntpopp/genefoundry-router/.github/workflows/_container-release.yml","workflow_revision":"${{ needs.prepare.outputs.standard_sha }}"}' \
            > "$RUNNER_TEMP/final/identity.json"
          # Scanner identity comes from `trivy version`, not from the scan report: the report
          # carries no ArtifactName/Metadata.DB for an OCI-archive scan, so those reads yielded
          # null and produced the literal string "null", which is not an RFC3339 timestamp.
          # `version` is the scanner's version, not the scanned artifact's name. Use -er so a
          # missing field fails the release instead of silently sealing unusable evidence.
          jq -n --arg version "$(jq -er '.Version' "$RUNNER_TEMP/build/trivy-version.json")" \
            --arg updated "$(jq -er '.VulnerabilityDB.UpdatedAt' "$RUNNER_TEMP/build/trivy-version.json")" \
            '{version:$version,database_updated_at:$updated}' > "$RUNNER_TEMP/final/scanner.json"
          # Sealed in the capture job, which is the last job holding the caller source.
          cp "$RUNNER_TEMP/capture/data-requirements.json" "$RUNNER_TEMP/final/data.json"
          uv run --project .container-release-tools \
            python .container-release-tools/scripts/container_release.py assemble-manifest \
            --identity "$RUNNER_TEMP/final/identity.json" \
            --definitions "$RUNNER_TEMP/final/mcp-definitions.json" \
            --context "$RUNNER_TEMP/final/mcp-capture-context.json" \
            --scanner "$RUNNER_TEMP/final/scanner.json" --data "$RUNNER_TEMP/final/data.json" \
            --asset-dir "$RUNNER_TEMP/final/assets" \
            --out "$RUNNER_TEMP/final/application-release-manifest.json"
          cd "$RUNNER_TEMP/final"
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload finalization artifact
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: release-final-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 2
          path: ${{ runner.temp }}/final

  finalize:
    name: Publish immutable release then version alias
    needs: [prepare, publish-attest, assemble-evidence]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    permissions:
      contents: write
      packages: write
    env:
      GH_TOKEN: ${{ github.token }}
      # This job deliberately never checks out the source: it is privileged and consumes
      # only sealed artifacts. `gh release` therefore has no git remote to infer, so name
      # the repository explicitly instead of granting it a working tree.
      GH_REPO: ${{ github.repository }}
      IMAGE: ${{ needs.prepare.outputs.image }}
      PUBLISHED_DIGEST: ${{ needs.publish-attest.outputs.published_digest }}
      SOURCE_ALIAS: ${{ needs.prepare.outputs.source_alias }}
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download sealed finalization artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.3.0
        with:
          name: release-final-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/final

      - name: Verify finalization evidence before credentials
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/final"
          sha256sum -c SHA256SUMS
          test "$(jq -er .image.digest application-release-manifest.json)" = "$PUBLISHED_DIGEST"

      - name: Install checksum-pinned gh and ORAS
        shell: bash
        run: |
          set -euo pipefail
          gh_version=2.96.0
          gh_sha256=83d5c2ccad5498f58bf6368acb1ab32588cf43ab3a4b1c301bf36328b1c8bd60
          oras_version=1.3.3
          oras_sha256=9ce999f8d2de03fc03968b29d743077a58783e545e5eaa53917ca177352d0e59
          curl -fsSL --proto '=https' --tlsv1.2 -o "$RUNNER_TEMP/gh.tar.gz" \
            "https://github.com/cli/cli/releases/download/v${gh_version}/gh_${gh_version}_linux_amd64.tar.gz"
          echo "$gh_sha256  $RUNNER_TEMP/gh.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/gh.tar.gz" -C "$RUNNER_TEMP"
          install -m 0755 "$RUNNER_TEMP/gh_${gh_version}_linux_amd64/bin/gh" "$RUNNER_TEMP/gh"
          "$RUNNER_TEMP/gh" release verify --help >/dev/null
          "$RUNNER_TEMP/gh" release verify-asset --help >/dev/null
          "$RUNNER_TEMP/gh" attestation verify --help >/dev/null
          "$RUNNER_TEMP/gh" attestation download --help >/dev/null
          "$RUNNER_TEMP/gh" attestation trusted-root --help >/dev/null
          curl -fsSL --proto '=https' --tlsv1.2 -o "$RUNNER_TEMP/oras.tar.gz" \
            "https://github.com/oras-project/oras/releases/download/v${oras_version}/oras_${oras_version}_linux_amd64.tar.gz"
          echo "$oras_sha256  $RUNNER_TEMP/oras.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/oras.tar.gz" -C "$RUNNER_TEMP" oras
          chmod 0755 "$RUNNER_TEMP/oras"

      - name: Create or verify immutable source release
        shell: bash
        run: |
          set -euo pipefail
          gh="$RUNNER_TEMP/gh"
          assets="$RUNNER_TEMP/final/assets"
          manifest="$RUNNER_TEMP/final/application-release-manifest.json"
          expected="$RUNNER_TEMP/final/release-assets"
          rm -rf "$expected" && mkdir -p "$expected"
          cp "$assets"/* "$expected"/
          cp "$manifest" "$expected"/
          if release_json="$($gh release view "$TAG" --json isDraft 2>/dev/null)"; then
            if [ "$(jq -r .isDraft <<<"$release_json")" = false ]; then
              $gh release verify "$TAG"
              echo "completed immutable release verified"
            else
              rm -rf "$RUNNER_TEMP/draft" && mkdir -p "$RUNNER_TEMP/draft"
              $gh release download "$TAG" --dir "$RUNNER_TEMP/draft"
              if diff -qr "$expected" "$RUNNER_TEMP/draft" >/dev/null; then
                echo "matching draft assets"
              else
                echo "mismatched draft assets; recreating unpublished draft"
                $gh release delete "$TAG" --yes
                $gh release create "$TAG" --draft --verify-tag --title "$TAG" \
                  --notes "Verified GeneFoundry research-use-only container release." \
                  "$expected"/*
              fi
            fi
          else
            $gh release create "$TAG" --draft --verify-tag --title "$TAG" \
              --notes "Verified GeneFoundry research-use-only container release." \
              "$expected"/*
          fi
          if [ "$($gh release view "$TAG" --json isDraft --jq .isDraft)" = true ]; then
            $gh release edit "$TAG" --draft=false
          fi
          # GitHub mints the immutable-release attestation asynchronously after publication,
          # so verifying immediately races it and fails with "no attestations for tag".
          verify_release() {
            for attempt in $(seq 1 30); do
              if $gh release verify "$TAG"; then return 0; fi
              echo "release attestation not yet published; retry $attempt"
              sleep 10
            done
            echo "release attestation never became available" >&2
            return 1
          }
          verify_release
          for asset in "$expected"/*; do
            $gh release verify-asset "$TAG" "$asset"
          done

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply missing version alias from identical manifest bytes
        shell: bash
        run: |
          set -euo pipefail
          oras="$RUNNER_TEMP/oras"
          source_digest="$($oras manifest fetch --descriptor "$IMAGE:$SOURCE_ALIAS" | jq -er .digest)"
          test "$source_digest" = "$PUBLISHED_DIGEST"
          if version_json="$($oras manifest fetch --descriptor "$IMAGE:$VERSION" 2>/dev/null)"; then
            version_digest="$(jq -er .digest <<<"$version_json")"
          else
            echo "missing version alias; applying identical accepted manifest bytes"
            $oras cp "$IMAGE:$SOURCE_ALIAS" "$IMAGE:$VERSION"
            version_digest="$($oras manifest fetch --descriptor "$IMAGE:$VERSION" | jq -er .digest)"
          fi
          test "$version_digest" = "$PUBLISHED_DIGEST" || {
            echo "version alias digest mismatch" >&2
            exit 1
          }
