name: Apply GHCR version alias

# One-shot recovery for a release whose image published and whose GitHub Release was
# created and attested, but whose finalize job failed before applying the version alias.
# Because a release tag is immutable once published, the tagged workflow cannot be
# corrected in place and re-running it would regenerate non-deterministic evidence
# (SBOM and Trivy embed timestamps) that no longer matches the attested release assets.
#
# This performs exactly the operation the finalize job performs and nothing else: copy
# the already-verified source-SHA alias to the version tag, proving the digest is
# unchanged before and after. It creates no new image content.
#
# Delete this workflow once the release control plane is stable.

on:
  workflow_dispatch:
    inputs:
      source_alias:
        description: Published source alias tag, e.g. sha-<40 hex>
        required: true
      version:
        description: Version alias to apply, e.g. 0.6.4
        required: true
      expected_digest:
        description: Digest recorded in the attested application release manifest
        required: true

permissions: {}

concurrency:
  group: release-alias-${{ github.repository }}
  cancel-in-progress: false

jobs:
  alias:
    name: Apply verified version alias
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Install checksum-pinned ORAS
        shell: bash
        run: |
          set -euo pipefail
          oras_version=1.3.3
          oras_sha256=9ce999f8d2de03fc03968b29d743077a58783e545e5eaa53917ca177352d0e59
          curl -fsSL --proto '=https' --tlsv1.2 -o "$RUNNER_TEMP/oras.tar.gz" \
            "https://github.com/oras-project/oras/releases/download/v${oras_version}/oras_${oras_version}_linux_amd64.tar.gz"
          echo "$oras_sha256  $RUNNER_TEMP/oras.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/oras.tar.gz" -C "$RUNNER_TEMP" oras
          chmod 0755 "$RUNNER_TEMP/oras"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply version alias from the identical published manifest
        shell: bash
        env:
          SOURCE_ALIAS: ${{ inputs.source_alias }}
          VERSION: ${{ inputs.version }}
          EXPECTED_DIGEST: ${{ inputs.expected_digest }}
        run: |
          set -euo pipefail
          oras="$RUNNER_TEMP/oras"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          [[ "$EXPECTED_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]

          source_digest="$($oras manifest fetch --descriptor "$image:$SOURCE_ALIAS" | jq -er .digest)"
          test "$source_digest" = "$EXPECTED_DIGEST" || {
            echo "source alias does not carry the attested digest" >&2
            exit 1
          }

          if version_json="$($oras manifest fetch --descriptor "$image:$VERSION" 2>/dev/null)"; then
            version_digest="$(jq -er .digest <<<"$version_json")"
          else
            echo "applying missing version alias"
            $oras cp "$image:$SOURCE_ALIAS" "$image:$VERSION"
            version_digest="$($oras manifest fetch --descriptor "$image:$VERSION" | jq -er .digest)"
          fi

          test "$version_digest" = "$EXPECTED_DIGEST" || {
            echo "version alias digest mismatch" >&2
            exit 1
          }
          echo "version alias $image:$VERSION -> $version_digest"
